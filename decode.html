<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>JWT Decoded — KeyToken Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0d14;
      --surface: #111520;
      --border: #1e2535;
      --accent: #00d4ff;
      --accent2: #7b61ff;
      --success: #00e5a0;
      --warning: #ffd166;
      --danger: #ff4d6a;
      --text: #e2e8f0;
      --muted: #4a5568;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      padding: 40px;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(0,212,255,0.2);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .fields-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .field-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      transition: border-color 0.2s;
    }

    .field-card:hover { border-color: rgba(0,212,255,0.3); }

    .field-key {
      font-size: 10px;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .field-value {
      font-size: 12px;
      color: var(--text);
      word-break: break-all;
      line-height: 1.5;
    }

    .field-value.timestamp { color: var(--success); }
    .field-value.number    { color: var(--warning); }
    .field-value.boolean   { color: var(--accent); }

    .raw-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      text-align: left;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .raw-toggle:hover { color: var(--accent); border-color: var(--accent); }
    .raw-toggle .arrow { margin-left: auto; transition: transform 0.2s; }
    .raw-toggle.open .arrow { transform: rotate(180deg); }

    pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      font-size: 12px;
      color: var(--success);
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.7;
      display: none;
    }

    pre.open { display: block; }

    #loading {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 60px 0;
    }

    #error-msg {
      color: var(--danger);
      background: rgba(255,77,106,0.08);
      border: 1px solid rgba(255,77,106,0.2);
      border-radius: 8px;
      padding: 16px;
      font-size: 12px;
      display: none;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo">🔍</div>
    <div>
      <h1>JWT PAYLOAD DECODED</h1>
      <div class="subtitle">KeyToken Manager · Keycloak OpenID Connect</div>
    </div>
  </header>

  <div id="loading">⏳ Carregando payload...</div>
  <div id="error-msg"></div>

  <div id="content" style="display:none">
    <div class="fields-grid" id="fields-grid"></div>
    <button class="raw-toggle" id="raw-toggle">
      { } VER JSON COMPLETO
      <span class="arrow">▼</span>
    </button>
    <pre id="raw-pre"></pre>
  </div>
</div>
<script src="decode.js"></script>
</body>
</html>
