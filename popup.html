<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KeyToken Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0d14;
      --surface: #111520;
      --border: #1e2535;
      --accent: #00d4ff;
      --accent2: #7b61ff;
      --danger: #ff4d6a;
      --success: #00e5a0;
      --warning: #ffd166;
      --text: #e2e8f0;
      --muted: #4a5568;
      --glow: 0 0 20px rgba(0, 212, 255, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Firefox fix: html and body must allow scrolling */
    html {
      height: 100%;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    body {
      width: 380px;
      /* Fixed height so Firefox popup shows scrollbar when content overflows */
      max-height: 610px;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* Webkit scrollbar (Chrome) */
    body::-webkit-scrollbar { width: 4px; }
    body::-webkit-scrollbar-track { background: transparent; }
    body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    body::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 20px;
      /* Ensure container can grow beyond viewport */
      min-height: min-content;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: var(--glow);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-text p {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 1px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      margin-left: auto;
      flex-shrink: 0;
      transition: all 0.3s;
    }

    .status-dot.active  { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-dot.loading { background: var(--warning); box-shadow: 0 0 8px var(--warning); animation: pulse 1s infinite; }
    .status-dot.error   { background: var(--danger);  box-shadow: 0 0 8px var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* Form */
    .form-group { margin-bottom: 12px; }

    label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 5px;
      font-family: 'JetBrains Mono', monospace;
    }

    .input-wrap { position: relative; }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.1);
    }

    input::placeholder { color: var(--muted); }

    .toggle-pass {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      padding: 2px;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: var(--accent); }

    /* Remember password */
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .remember-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      user-select: none;
    }

    .remember-label input[type="checkbox"] { display: none; }

    .checkmark {
      width: 15px;
      height: 15px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 10px;
    }

    .remember-label:hover .checkmark { border-color: var(--accent); }

    .remember-label input[type="checkbox"]:checked + .checkmark {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
    }

    .remember-label input[type="checkbox"]:checked + .checkmark::after {
      content: '✓';
      color: #0a0d14;
      font-weight: 900;
      font-size: 9px;
      line-height: 1;
    }

    .remember-hint {
      font-size: 9px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      opacity: 0.6;
    }

    /* Collapsible config */
    .config-toggle {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      text-align: left;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .config-toggle:hover { color: var(--accent); border-color: var(--accent); }

    .config-toggle .arrow { margin-left: auto; transition: transform 0.2s; }
    .config-toggle.open .arrow { transform: rotate(180deg); }

    .config-section { display: none; }
    .config-section.open {
      display: block;
      animation: slideDown 0.2s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Main button */
    .btn-fetch {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: #0a0d14;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: var(--glow);
      margin-top: 4px;
    }

    .btn-fetch:hover   { opacity: 0.9; }
    .btn-fetch:active  { transform: scale(0.98); }
    .btn-fetch:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Error */
    .error-box {
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(255, 77, 106, 0.08);
      border: 1px solid rgba(255, 77, 106, 0.2);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--danger);
      display: none;
      line-height: 1.5;
    }

    .error-box.visible { display: block; animation: slideDown 0.2s ease; }

    /* Token output */
    .token-section { margin-top: 16px; display: none; }
    .token-section.visible { display: block; animation: slideDown 0.3s ease; }

    .token-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .token-header span {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }

    .badge {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .badge.success {
      background: rgba(0, 229, 160, 0.1);
      color: var(--success);
      border: 1px solid rgba(0, 229, 160, 0.2);
    }

    .badge.expired {
      background: rgba(255, 77, 106, 0.1);
      color: var(--danger);
      border: 1px solid rgba(255, 77, 106, 0.2);
    }

    .token-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      position: relative;
    }

    /* Scroll fix: use overflow-y scroll instead of hidden + fade */
    .token-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      word-break: break-all;
      line-height: 1.5;
      max-height: 14px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      padding-right: 4px;
    }

    .token-value::-webkit-scrollbar { width: 3px; }
    .token-value::-webkit-scrollbar-track { background: transparent; }
    .token-value::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .token-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .btn-small {
      flex: 1;
      padding: 7px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .btn-small:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0, 212, 255, 0.05);
    }

    .btn-small.copied { border-color: var(--success); color: var(--success); }

    /* Meta info */
    .meta-info { display: flex; gap: 8px; margin-top: 10px; }

    .meta-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      text-align: center;
    }

    .meta-card .meta-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 3px;
      display: block;
    }

    .meta-card .meta-value {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Timer bar */
    .timer-bar {
      margin-top: 10px;
      margin-bottom: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
    }

    .timer-label {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #timer-remaining { color: var(--success); font-weight: 600; }

    .progress {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 1s linear, background 0.3s;
    }

    .progress-bar.warning { background: linear-gradient(90deg, var(--warning), var(--danger)); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo"><img src="icon48.png" alt="KeyToken Manager" /></div>
    <div class="header-text">
      <h1>KEYTOKEN MANAGER</h1>
      <p>keycloak · openid connect</p>
    </div>
    <div class="status-dot" id="status-dot"></div>
  </header>

  <!-- Credentials -->
  <div class="form-group">
    <label>Usuário</label>
    <input type="text" id="username" placeholder="login" autocomplete="username" />
  </div>

  <div class="form-group">
    <label>Senha</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      <button class="toggle-pass" id="toggle-pass" title="Mostrar/Ocultar senha">👁</button>
    </div>
  </div>

  <div class="form-group remember-row">
    <label class="remember-label">
      <input type="checkbox" id="remember-password" />
      <span class="checkmark"></span>
      LEMBRAR SENHA
    </label>
    <span class="remember-hint">armazenada localmente no navegador</span>
  </div>

  <!-- Advanced config -->
  <button class="config-toggle" id="config-toggle">
    ⚙ CONFIGURAÇÕES AVANÇADAS
    <span class="arrow">▼</span>
  </button>

  <div class="config-section" id="config-section">
    <div class="form-group">
      <label>URL do Token</label>
      <input type="text" id="token-url" value="https://keycloak.example.com/auth/realms/REALM/protocol/openid-connect/token" />
    </div>
    <div class="form-group">
      <label>Client ID</label>
      <input type="text" id="client-id" value="cliente" />
    </div>
  </div>

  <button class="btn-fetch" id="btn-fetch">⚡ OBTER ACCESS TOKEN</button>

  <!-- Error -->
  <div class="error-box" id="error-box"></div>

  <!-- Token output -->
  <div class="token-section" id="token-section">
    <div class="token-header">
      <span>ACCESS TOKEN</span>
      <span class="badge success" id="token-badge">ATIVO</span>
    </div>
    <div class="token-box">
      <div class="token-value" id="token-value"></div>
    </div>
    <div class="token-actions">
      <button class="btn-small" id="btn-copy">📋 COPIAR TOKEN</button>
      <button class="btn-small" id="btn-decode">🔍 DECODIFICAR</button>
    </div>
    <div class="meta-info">
      <div class="meta-card">
        <span class="meta-label">Tipo</span>
        <div class="meta-value" id="token-type">—</div>
      </div>
      <div class="meta-card">
        <span class="meta-label">Expira em</span>
        <div class="meta-value" id="token-expires">—</div>
      </div>
      <div class="meta-card">
        <span class="meta-label">Obtido às</span>
        <div class="meta-value" id="token-time">—</div>
      </div>
    </div>
    <div class="timer-bar">
      <div class="timer-label">
        <span>VALIDADE</span>
        <span id="timer-remaining">—</span>
      </div>
      <div class="progress">
        <div class="progress-bar" id="progress-bar" style="width:100%"></div>
      </div>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
